<!DOCTYPE html>
<html>
<head>
    <title>SecureBoard Admin Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #172033;
        }

        .navbar {
            background: #101827;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
        }

        .back-button {
            background: #e2e8f0;
            color: #0f172a;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .login-card {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            margin-bottom: 16px;
            font-size: 15px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 13px 18px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .flash {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: 700;
            background: #e0f2fe;
            color: #075985;
            border: 1px solid #bae6fd;
        }

        .hint {
            margin-top: 18px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
        }

        code {
            background: #f1f5f9;
            padding: 2px 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">SecureBoard Admin</div>
        <a class="back-button" href="{{ url_for('index') }}">Back to Board</a>
    </div>

    <div class="container">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="login-card">
            <h1>Admin Login</h1>

            <form method="POST">
                <label>Username</label>
                <input type="text" name="username" placeholder="Admin username">

                <label>Password</label>
                <input type="password" name="password" placeholder="Admin password">

                <button type="submit">Login to Logs</button>
            </form>

            <div class="hint">
                Default login:<br>
                Username: <code>codexcapital</code><br>
                Password: <code>Testing123</code>
            </div>
        </div>

    </div>

</body>
</html>
